<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Черноморский молокозавод | База знаний</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body data-theme="light">
    <div class="wiki">
        <header class="wiki__header">
            <div class="wiki__logo">
                <span class="wiki__logo-icon">🧑‍💻</span>
                <div>
                    <h1>Черноморский молокозавод</h1>
                    <p>База знаний • инструкции и регламенты</p>
                </div>
            </div>
            <div class="wiki__actions">
                <button class="btn-icon" id="appsDownloadBtn" title="Приложения">📱</button>
                <button class="btn-icon" id="themeToggle" title="Тема">🌙</button>
            </div>
        </header>

        <nav class="wiki__nav">
            <a href="#" data-section="departments">👥 Отделы</a>
            <a href="#" data-section="corporate">🏢 Корпоративные</a>
            <a href="#" data-section="stores">🏪 Магазины</a>
            <a href="#" data-section="support">🆘 Поддержка</a>
        </nav>

        <main class="wiki__content" id="dynamicContent"></main>

        <footer class="wiki__footer">
            <p>© 2026 Черноморский молокозавод</p>
        </footer>
    </div>

    <!-- Модалка пароля -->
    <div id="passwordModal" class="modal">
        <div class="modal__overlay"></div>
        <div class="modal__card">
            <button class="modal__close">&times;</button>
            <h3>🔐 Доступ к IT-отделу</h3>
            <p>Введите пароль для просмотра инструкций</p>
            <input type="password" id="passwordInput" class="modal__input" placeholder="Пароль">
            <div id="passwordError" class="modal__error"></div>
            <div class="modal__actions">
                <button id="passwordConfirmBtn" class="btn btn-primary">Подтвердить</button>
                <button id="passwordCancelBtn" class="btn btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модалка приложений -->
    <div id="appsModal" class="modal">
        <div class="modal__overlay"></div>
        <div class="modal__card modal__card--wide">
            <button class="modal__close">&times;</button>
            <h3>📱 Корпоративные приложения</h3>
            <div id="appsModalBody"></div>
        </div>
    </div>

    <!-- Модалка инструкций -->
    <div id="instructionModal" class="modal modal--full">
        <div class="modal__overlay"></div>
        <div class="modal__card modal__card--full">
            <button class="modal__close">&times;</button>
            <div id="modalBreadcrumb" class="breadcrumb"></div>
            <h3 id="modalTitle">📄 Инструкция</h3>
            <div id="modalBody" class="modal__body markdown-body"></div>
            <div class="modal__footer">
                <button id="modalBackBtn" class="btn btn-secondary">← Назад</button>
                <div>
                    <button id="modalGoogleBtn" class="btn btn-primary">🔗 Google Docs</button>
                    <button id="modalCloseBtn" class="btn btn-secondary">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- IT-дашборд модалка -->
    <div id="itDashboardModal" class="modal modal--full">
        <div class="modal__overlay"></div>
        <div class="modal__card modal__card--dashboard">
            <button class="modal__close">&times;</button>
            <div class="breadcrumb" id="itBreadcrumb"><span class="breadcrumb__item active">📁 IT-библиотека</span>
            </div>
            <div class="dashboard__header">
                <h3>🖥️ IT-отдел <span class="badge">Защищено</span></h3>
                <div class="dashboard__search">
                    <input type="text" id="itSearchInput" placeholder="🔍 Поиск..." class="dashboard__input">
                    <button id="itClearSearch" class="dashboard__clear">✖</button>
                </div>
            </div>
            <div class="dashboard__filters" id="itFilters"></div>
            <div id="itCardsContainer" class="dashboard__cards"></div>
            <div class="modal__footer">
                <button id="itDashboardBackBtn" class="btn btn-secondary">← Назад</button>
                <button id="itDashboardCloseBtn" class="btn btn-secondary">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
